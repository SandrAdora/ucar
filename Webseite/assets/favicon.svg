<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#1a2a40"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="32" height="32" rx="7" ry="7"
        fill="none" stroke="#e8733a" stroke-width="1.5" opacity="0.7"/>

  <!-- "UC" initials -->
  <text
    x="16" y="22"
    font-family="Arial, sans-serif"
    font-size="15"
    font-weight="800"
    text-anchor="middle"
    fill="#e8733a"
    letter-spacing="-0.5"
  >UC</text>
</svg>
