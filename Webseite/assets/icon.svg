<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#1a2a40"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8733a"/>
      <stop offset="100%" stop-color="#cf6030"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Orange border accent -->
  <rect width="100" height="100" rx="22" ry="22"
        fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.7"/>

  <!-- "UC" initials -->
  <text
    x="50" y="62"
    font-family="Arial, sans-serif"
    font-size="44"
    font-weight="800"
    text-anchor="middle"
    fill="url(#accent)"
    letter-spacing="-1"
  >UC</text>

  <!-- Subtle underline / car road line -->
  <rect x="20" y="70" width="60" height="3" rx="1.5" fill="#e8733a" opacity="0.35"/>
</svg>
